name: Deploy date-invite to GitHub Pages

on:
  push:
    branches:
      - claude/dating-preference-page-bOu7e
    paths:
      - "date-invite/**"
      - ".github/workflows/deploy-date-invite.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload date-invite folder
        uses: actions/upload-pages-artifact@v3
        with:
          path: date-invite

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
