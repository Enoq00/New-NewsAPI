name: Deploy date-invite to GitHub Pages

on:
  push:
    branches:
      - master
      - claude/dating-preference-page-bOu7e
    paths:
      - "docs/**"
      - ".github/workflows/deploy-date-invite.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # Enable Pages (source = GitHub Actions) and build the artifact.
  # This job has NO environment mapping, so it is never gated and can turn
  # Pages on via the API the first time it runs.
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages (enable if needed)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload date-invite folder
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  # Deploy the artifact. Runs after Pages is enabled, so the github-pages
  # environment gate is satisfied.
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
